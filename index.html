<!doctype html>
<html lang="en">
  <head>
    <title>Module Router</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico">
    <script type="module" src="/module-router.js"></script>
    <script type="module" src="/about.js" path="/about"></script>
    <script type="module" src="/hello-world.js" path="/:name" title="Hello :name"></script>
    <script type="module" src="/hello-world.js" path="/" title="Home"></script>
    <script type="module" src="/iam.js" path="/iam/:firstname/:lastname"></script>
    <script type="module" src="/dashboard.js" path="/dashboard/:user"></script>
    <script type="module" src="/lit-content.js" path="/lit-content"></script>
  </head>
  <body>
    <module-router>
      <template>
        <header class="container">
          <nav>
            <ul><li><strong>{title}</strong></li></ul>
            <ul>
              <li><a href="/">Home</a></li>
              <li><a href="/world">Hello World</a></li>
              <li><a href="/dashboard/John">Dashboard</a></li>
              <li><a href="/iam/module/router">I am</a></li>
              <li><a href="/lit-content">Lit Content</a></li>
              <li><a href="/about">About</a></li>
            </ul>
          </nav>
        </header>
        
        <main class="container">
          {content}
        </main>

        <footer class="container">
          <small>Built with module-router</small>
        </footer>
      </template>
    </module-router>
  </body>
</html>
